version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timeflux-timescaledb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: timeseries
    ports:
      - "5433:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - timeflux-network

  timeflux:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: timeflux-app
    ports:
      - "8086:8086"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - timeflux-network
    restart: unless-stopped

volumes:
  timescaledb-data:
    driver: local

networks:
  timeflux-network:
    driver: bridge
